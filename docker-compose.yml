version: '2.2'

services:
  postgres2:
    image: postgres:latest
    env_file:
      - ./src/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data2:/var/lib/postgresql/data/pgdata
    networks:
      - db_network2

  web2:
    build: ./
    command: gunicorn conf.wsgi:application --bind 0.0.0.0:8000
    restart: always
    volumes:
      - static_volume2:/usr/src/app/static
      - media_volume2:/usr/src/app/media
    ports:
      - "8001:8000"
    env_file:
      - ./src/.env
    depends_on:
      - postgres2
    networks:
      - db_network2

  nginx2:
    build:
      context: .
      dockerfile: ./nginx.Dockerfile
    restart: always
    ports:
      - "8080:80"
    volumes:
      - static_volume:/usr/src/app/static
      - media_volume:/usr/src/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web2
    networks:
      - app_network2



volumes:
  static_volume2:
  media_volume2:
  postgres_data2:
    driver: local

networks:
  db_network2:
  app_network2: